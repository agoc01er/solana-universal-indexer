version: '3.8'

services:
  indexer:
    build: .
    ports:
      - "3000:3000"
    environment:
      - RPC_URL=${RPC_URL:-https://api.mainnet-beta.solana.com}
      - PROGRAM_ID=${PROGRAM_ID}
      - IDL_PATH=/app/idl.json
      - DB_PATH=/data/indexer.db
      - PORT=3000
      - MODE=${MODE:-realtime}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-5000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./idl.json:/app/idl.json:ro
      - indexer_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  indexer_data:
