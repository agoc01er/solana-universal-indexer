version: '3.8'

services:
  # ── PostgreSQL (production backend) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-indexer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-indexer}
      POSTGRES_DB: ${POSTGRES_DB:-solana_indexer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-indexer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  # ── Indexer (SQLite mode — zero dependencies) ─────────────────────────────
  indexer:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PROGRAM_ID=${PROGRAM_ID}
      - RPC_URL=${RPC_URL:-https://api.mainnet-beta.solana.com}
      - WS_URL=${WS_URL:-}
      - IDL_PATH=/app/idl.json
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_PATH=/data/indexer.db
      - DATABASE_URL=${DATABASE_URL:-}
      - PORT=3000
      - MODE=${MODE:-realtime}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-5000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./idl.json:/app/idl.json:ro
      - indexer_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - sqlite

  # ── Indexer (PostgreSQL mode) ──────────────────────────────────────────────
  indexer-pg:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PROGRAM_ID=${PROGRAM_ID}
      - RPC_URL=${RPC_URL:-https://api.mainnet-beta.solana.com}
      - WS_URL=${WS_URL:-}
      - IDL_PATH=/app/idl.json
      - DB_TYPE=postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-indexer}:${POSTGRES_PASSWORD:-indexer}@postgres:5432/${POSTGRES_DB:-solana_indexer}
      - PORT=3000
      - MODE=${MODE:-realtime}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./idl.json:/app/idl.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - postgres

volumes:
  postgres_data:
  indexer_data:
